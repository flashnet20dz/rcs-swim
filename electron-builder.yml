# ═══════════════════════════════════════════════════════════
# RCS Club Desktop — Hybrid (Offline + Online) Builder Config
# Next.js Standalone + Electron + Prisma + SQLite
# ═══════════════════════════════════════════════════════════

appId: com.rcs.club
productName: "RCS Club"
copyright: "Copyright © 2026 RCS Club Management System"

directories:
  output: dist
  buildResources: build

# ═══ ملفات داخل asar ═══
# نستخدم بنية Next.js Standalone: .next/standalone/ يحتوي على كل ما يلزم
asar: true
files:
  # ملفات Electron
  - "electron/main.js"
  - "electron/preload.js"
  - "electron/desktop-settings.js"
  - "electron/splash.html"
  - "electron/auto-updater.js"
  - "electron/license.js"
  - "electron/sync-engine.js"
  - "electron/activation.html"
  # Next.js Standalone server + dependencies
  - ".next/standalone/**/*"
  # ملفات static (CSS, JS chunks, fonts)
  - ".next/static/**/*"
  # الملفات العامة (images, icons, manifest)
  - "public/**/*"
  # Prisma schema + engine
  - "prisma/schema.prisma"
  - "node_modules/@prisma/client/**/*"
  - "node_modules/.prisma/**/*"
  # package.json (مطلوب في جذر asar)
  - "package.json"
  # next.config (مطلوب لـ standalone server)
  - "next.config.ts"
  # استبعادات
  - "!**/.git/**"
  - "!dist/**"
  - "!upload/**"
  - "!scripts/**"
  - "!skills/**"
  - "!tool-results/**"
  - "!download/**"
  - "!build-electron/**"
  - "!.env*"
  - "!**/*.md"
  - "!build-setup.*"
  - "!installer*.nsi"
  - "!electron/*.ts"

# ═══ extraResources (خارج asar — للأيقونة فقط) ═══
extraResources:
  - from: "public/images/icon.ico"
    to: "icon.ico"

# ════════════ Windows Configuration ════════════
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: "public/images/icon.ico"

# ════════════ NSIS Installer Configuration ════════════
nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  shortcutName: "RCS Club"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  menuCategory: "RCS Club"
  installerIcon: "public/images/icon.ico"
  uninstallerIcon: "public/images/icon.ico"
  installerHeaderIcon: "public/images/icon.ico"
  installerLanguages:
    - en_US
  runAfterFinish: true
  uninstallDisplayName: "RCS Club"
  deleteAppDataOnUninstall: false
  license: "LICENSE"
  differentialPackage: true
  packElevateHelper: true

# ════════════ Build Optimization ════════════
compression: maximum
removePackageScripts: false
removePackageKeywords: true
