<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>نادي RCS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 500px;
      height: 350px;
      background: linear-gradient(135deg, #0f766e 0%, #0369a1 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cairo', 'Tahoma', Arial, sans-serif;
      color: white;
      overflow: hidden;
      border-radius: 20px;
    }
    .logo {
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    .logo svg {
      width: 60px;
      height: 60px;
      fill: white;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    p {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 25px;
    }
    .progress {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: white;
      animation: loading 2s ease-in-out infinite;
    }
    .version {
      position: absolute;
      bottom: 15px;
      font-size: 10px;
      opacity: 0.6;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 12h20M12 2v20M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
      <circle cx="12" cy="12" r="3" fill="white"/>
    </svg>
  </div>
  <h1>نادي RCS</h1>
  <p>منظومة إدارة الاشتراكات والسباحة</p>
  <div class="progress">
    <div class="progress-bar"></div>
  </div>
  <div class="version">الإصدار 1.0.0 — جاري التحميل...</div>
</body>
</html>
